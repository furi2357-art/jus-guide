<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>수강생 안내 | 장의순 수능국어</title>
<meta name="robots" content="noindex">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ground: #ffffff; --ink: #171310; --muted: #6f645b;
    --line: #e6e0d9; --accent: #ea5b0c;
  }
  @media (prefers-color-scheme: dark) {
    :root { --ground: #141110; --ink: #f2ede8; --muted: #a39890; --line: #322c28; --accent: #ff7a2f; }
  }
  body {
    background: var(--ground); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", "Noto Sans KR", sans-serif;
    line-height: 1.7; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 34rem; margin: 0 auto; padding: 5rem 1.25rem; display: flex; flex-direction: column; gap: 2.25rem; }
  .eyebrow { font-size: .74rem; font-weight: 700; letter-spacing: .16em; color: var(--accent); }
  h1 { font-size: 2rem; font-weight: 800; letter-spacing: -.025em; margin-top: .8rem; }
  ul { list-style: none; display: flex; flex-direction: column; }
  li { border-top: 1px solid var(--line); }
  li:last-child { border-bottom: 1px solid var(--line); }
  a { display: flex; justify-content: space-between; align-items: center; gap: 1rem; padding: 1.1rem .25rem; color: inherit; text-decoration: none; font-weight: 600; }
  a:hover { color: var(--accent); }
  a::after { content: "→"; color: var(--muted); }
  a:hover::after { color: var(--accent); }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">장의순 수능국어</div>
      <h1>수강생 안내</h1>
    </header>
    <ul>
      <li><a href="./add-course/">프리패스에 강좌 추가하는 법</a></li>
    </ul>
  </div>
</body>
</html>
